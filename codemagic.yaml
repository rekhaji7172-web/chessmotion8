workflows:
  android-release:
    name: ChessMotion Android Release
    max_build_duration: 60

    environment:
      flutter: 3.24.5
      java: 17

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true
          source: true

    scripts:
      - name: Print versions
        script: |
          flutter --version
          java -version

      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Build release APK
        script: |
          flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/*.apk

    publishing:
      email:
        recipients:
          - rekhaji7172@gmail.com
