workflows:
  android-release:
    name: ChessMotion Android Release
    max_build_duration: 60

    environment:
      flutter: 3.24.5
      java: 17

    scripts:
      - name: Print versions
        script: |
          flutter --version
          java -version

      - name: Clean project
        script: |
          flutter clean

      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Build release APK
        script: |
          flutter build apk --release --no-tree-shake-icons

    artifacts:
      - build/app/outputs/flutter-apk/**/*.apk
      - build/app/outputs/apk/release/*.apk
      - build/**/*.apk

    publishing:
      email:
        recipients:
          - rekhaji7172@gmail.com
        notify:
          success: true
          failure: true
