name: Flutter Build APK

# Ye workflow ab chalega jab aap 'master' branch par code push karenge
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. GitHub Repository se code checkout karna
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Java Environment setup karna
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Flutter Environment setup karna
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      # 4. Flutter packages get karna
      - name: Install dependencies
        run: flutter pub get

      # 5. Release APK Build karna
      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      # 6. Generated APK ko GitHub par upload karna
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
